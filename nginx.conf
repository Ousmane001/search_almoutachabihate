server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy interne vers le conteneur API (meme reseau docker-compose) :
    # evite toute config CORS/HTTPS cote client, comme en dev avec le proxy Vite.
    location /v1/ {
        proxy_pass http://api:8080/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 20m;
    }

    location /health {
        proxy_pass http://api:8080/health;
    }

    location ~* \.(?:css|js|woff2?|ttf|otf|svg|png|jpg|jpeg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
